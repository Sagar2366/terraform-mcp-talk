name: Demo Dry Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  TF_VERSION: "1.12.0"
  TF_WORKING_DIR: infra
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-mcp-server:
    name: Validate MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull MCP server image
        run: docker pull hashicorp/terraform-mcp-server:latest

      - name: Verify MCP server responds to JSON-RPC
        run: |
          RESPONSE=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-test","version":"1.0.0"}}}' \
            | timeout 10 docker run -i --rm hashicorp/terraform-mcp-server:latest 2>/dev/null \
            | grep -o '"terraform-mcp-server"' || true)
          if [ -z "$RESPONSE" ]; then
            echo "ERROR: MCP server did not return expected server info"
            exit 1
          fi
          echo "MCP server responded with terraform-mcp-server identity"

  validate-skills:
    name: Validate Skills Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Anton's Terraform Skill
        run: npx -y skills add antonbabenko/terraform-skill

      - name: Install HashiCorp Agent Skills
        run: npx -y skills add hashicorp/agent-skills

      - name: Verify skills installed
        run: |
          SKILL_COUNT=$(find . -name "SKILL.md" -type f 2>/dev/null | wc -l)
          echo "Found $SKILL_COUNT SKILL.md files"
          if [ "$SKILL_COUNT" -eq 0 ]; then
            echo "ERROR: No skills found after install"
            exit 1
          fi
          find . -name "SKILL.md" -type f

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [validate-mcp-server, validate-skills]
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for Terraform files
        run: |
          if ! ls *.tf 1>/dev/null 2>&1; then
            echo "No .tf files found in ${{ env.TF_WORKING_DIR }}/"
            echo "Generate Terraform from prompts.md, commit to ${{ env.TF_WORKING_DIR }}/, then push."
            exit 1
          fi
          echo "Found Terraform files:"
          ls -la *.tf

      - name: Install Terraform
        run: |
          curl -fsSL "https://releases.hashicorp.com/terraform/$TF_VERSION/terraform_${TF_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
          sudo unzip -o /tmp/terraform.zip -d /usr/local/bin/
          terraform version
        working-directory: .

      - name: Terraform fmt
        run: terraform fmt -check -diff

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform test
        run: |
          if ls tests/*.tftest.hcl 1>/dev/null 2>&1; then
            terraform test
          else
            echo "No test files found — skipping terraform test"
          fi

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          curl -fsSL "https://releases.hashicorp.com/terraform/$TF_VERSION/terraform_${TF_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
          sudo unzip -o /tmp/terraform.zip -d /usr/local/bin/
        working-directory: .

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Show outputs
        run: terraform output

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    if: always() && needs.terraform-apply.result == 'success'
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          curl -fsSL "https://releases.hashicorp.com/terraform/$TF_VERSION/terraform_${TF_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
          sudo unzip -o /tmp/terraform.zip -d /usr/local/bin/
        working-directory: .

      - name: Terraform init
        run: terraform init

      - name: Terraform destroy
        run: terraform destroy -auto-approve
