name: Demo Dry Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  TF_VERSION: "1.12.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-mcp-server:
    name: Validate MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull MCP server image
        run: docker pull hashicorp/terraform-mcp-server:latest

      - name: Verify MCP server responds to JSON-RPC
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-test","version":"1.0.0"}}}' \
            | timeout 10 docker run -i --rm hashicorp/terraform-mcp-server:latest \
            | head -c 2000
          echo ""
          echo "MCP server responded successfully"

  validate-skills:
    name: Validate Skills Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Anton's Terraform Skill
        run: npx -y skills add antonbabenko/terraform-skill

      - name: Install HashiCorp Agent Skills
        run: npx -y skills add hashicorp/agent-skills

      - name: Verify skills installed
        run: |
          echo "--- Installed skills ---"
          find . -name "SKILL.md" -type f 2>/dev/null || true
          echo "Skills install completed"

  deploy-ec2:
    name: Deploy EC2 (Apply + Destroy)
    runs-on: ubuntu-latest
    needs: [validate-mcp-server, validate-skills]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          curl -fsSL "https://releases.hashicorp.com/terraform/$TF_VERSION/terraform_${TF_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
          sudo unzip -o /tmp/terraform.zip -d /usr/local/bin/
          terraform version

      - name: Verify AWS credentials
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "AWS_ACCESS_KEY_ID secret not set — skipping deploy"
            echo "SKIP_DEPLOY=true" >> $GITHUB_ENV
          else
            echo "AWS credentials configured"
          fi

      - name: Generate Terraform config
        if: env.SKIP_DEPLOY != 'true'
        run: |
          mkdir -p /tmp/demo-ec2
          cat > /tmp/demo-ec2/main.tf << 'TFEOF'
          terraform {
            required_version = ">= 1.6"
            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "~> 5.0"
              }
            }
          }

          provider "aws" {
            region = "us-east-1"
            default_tags {
              tags = {
                ManagedBy   = "terraform"
                Environment = "ci"
                Team        = "demo"
                Purpose     = "ci-dry-run"
              }
            }
          }

          data "aws_ami" "amazon_linux" {
            most_recent = true
            owners      = ["amazon"]
            filter {
              name   = "name"
              values = ["al2023-ami-*-x86_64"]
            }
            filter {
              name   = "virtualization-type"
              values = ["hvm"]
            }
          }

          resource "aws_vpc" "ci" {
            cidr_block           = "10.99.0.0/16"
            enable_dns_hostnames = true
            tags = { Name = "ci-dry-run-vpc" }
          }

          resource "aws_subnet" "ci" {
            vpc_id                  = aws_vpc.ci.id
            cidr_block              = "10.99.1.0/24"
            map_public_ip_on_launch = true
            tags = { Name = "ci-dry-run-subnet" }
          }

          resource "aws_internet_gateway" "ci" {
            vpc_id = aws_vpc.ci.id
            tags   = { Name = "ci-dry-run-igw" }
          }

          resource "aws_route_table" "ci" {
            vpc_id = aws_vpc.ci.id
            route {
              cidr_block = "0.0.0.0/0"
              gateway_id = aws_internet_gateway.ci.id
            }
            tags = { Name = "ci-dry-run-rt" }
          }

          resource "aws_route_table_association" "ci" {
            subnet_id      = aws_subnet.ci.id
            route_table_id = aws_route_table.ci.id
          }

          resource "aws_security_group" "ci" {
            name        = "ci-dry-run-sg"
            description = "CI dry run - HTTPS only"
            vpc_id      = aws_vpc.ci.id
            tags        = { Name = "ci-dry-run-sg" }
          }

          resource "aws_vpc_security_group_ingress_rule" "https" {
            security_group_id = aws_security_group.ci.id
            description       = "Allow HTTPS"
            cidr_ipv4         = "0.0.0.0/0"
            from_port         = 443
            to_port           = 443
            ip_protocol       = "tcp"
          }

          resource "aws_vpc_security_group_egress_rule" "all" {
            security_group_id = aws_security_group.ci.id
            description       = "Allow all outbound"
            cidr_ipv4         = "0.0.0.0/0"
            ip_protocol       = "-1"
          }

          resource "aws_instance" "ci" {
            ami                    = data.aws_ami.amazon_linux.id
            instance_type          = "t3.micro"
            subnet_id              = aws_subnet.ci.id
            vpc_security_group_ids = [aws_security_group.ci.id]
            root_block_device {
              volume_type = "gp3"
              volume_size = 8
              encrypted   = true
            }
            tags = { Name = "ci-dry-run-ec2" }
          }

          output "instance_id" {
            value = aws_instance.ci.id
          }

          output "public_ip" {
            value = aws_instance.ci.public_ip
          }
          TFEOF

      - name: Terraform init
        if: env.SKIP_DEPLOY != 'true'
        working-directory: /tmp/demo-ec2
        run: terraform init

      - name: Terraform plan
        if: env.SKIP_DEPLOY != 'true'
        working-directory: /tmp/demo-ec2
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: env.SKIP_DEPLOY != 'true'
        working-directory: /tmp/demo-ec2
        run: terraform apply -auto-approve tfplan

      - name: Verify EC2 is running
        if: env.SKIP_DEPLOY != 'true'
        working-directory: /tmp/demo-ec2
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)
          echo "Created instance: $INSTANCE_ID"
          aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' --output text

      - name: Terraform destroy
        if: always() && env.SKIP_DEPLOY != 'true'
        working-directory: /tmp/demo-ec2
        run: terraform destroy -auto-approve
